node_id: create_layout_ports
summary: Create 3D Layout ports for selected nets using a board-specific port rule.
status: experimental
track: layout-brd
allowed_apis:
  - Hfss3dLayout.oeditor.ToggleViaPin
  - Hfss3dLayout.create_ports_on_component_by_nets
  - Hfss3dLayout.create_differential_port
inputs:
  required: [layout, signal_nets, reference_nets]
  optional: [port_candidates, port_rule, impedance, solderball_type, solderball_diameter, solderball_mid_diameter, solderball_height, solderball_material]
outputs:
  creates: [port]
  fields: [port_names, port_action_plan]
prerequisites:
  - locate_layout_port_candidates
  - configure_layout_stackup
examples: [import_brd_cutout_sparam_tdr]
