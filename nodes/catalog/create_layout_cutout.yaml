node_id: create_layout_cutout
summary: Experimental Layout/BRD node that creates a multi-threaded PyEDB cutout around selected signal nets with reference nets.
status: experimental
track: layout-brd
allowed_apis:
  - pyedb.Edb.cutout
inputs:
  required: [layout, signal_nets, reference_nets]
outputs:
  creates: [cutout_edb, hfss3dlayout_project]
prerequisites:
