node_id: configure_layout_stackup
summary: Load a stackup XML through HFSS 3D Layout after the cutout EDB is opened as a 3D Layout project.
status: experimental
track: layout-brd
allowed_apis:
  - Hfss3dLayout.modeler.oeditor.ImportStackupXML
inputs:
  required: [layout]
  optional: [stackup_xml, stackup_rule]
outputs:
  creates: [stackup]
prerequisites:
  - create_layout_cutout
examples: [import_brd_cutout_sparam_tdr]
