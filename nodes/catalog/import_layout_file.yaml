node_id: import_layout_file
summary: Experimental Layout/BRD node that opens a Cadence BRD/MCM layout with PyEDB so nets can be resolved before cutout.
status: experimental
track: layout-brd
allowed_apis:
  - pyedb.Edb
  - pyedb.Edb.nets
inputs:
  required: [layout_file]
outputs:
  creates: [source_edb, net_inventory]
prerequisites: []
examples: [import_brd_cutout_sparam_tdr]
notes:
  - Experimental Layout/BRD node; not included in default HFSS core planning.
  - Requires explicit experimental catalog enablement.
