id: brd_recorded_void_action
version: 1
description: Execute one approved recorded BRD void adjustment and deterministically accept, review, or roll it back.
nodes:
  - id: action_validator
    role: validator
    kind: program
    input_schema: controlled_void_action
    output_schema: validated_void_action
    max_runs: 1
  - id: action_approval_gate
    role: approval_gate
    kind: human_gate
    input_schema: validated_void_action
    output_schema: action_approval_decision
    join: any
    max_runs: 1
  - id: recorded_action_worker
    role: worker
    kind: worker
    capability: brd.action.execute_recorded
    input_schema: approved_void_action
    output_schema: recorded_action_result
    max_runs: 1
  - id: final_scorecard
    role: scorecard
    kind: program
    input_schema: recorded_action_result
    output_schema: scorecard_report
    max_runs: 1
edges:
  - id: validator-to-approval
    from: action_validator
    to: action_approval_gate
    on: succeeded
    max_traversals: 1
  - id: approval-to-action-worker
    from: action_approval_gate
    to: recorded_action_worker
    on: approved
    max_traversals: 1
  - id: action-worker-to-scorecard
    from: recorded_action_worker
    to: final_scorecard
    on: succeeded
    max_traversals: 1
handoffs:
  controlled_void_action:
    required_fields:
      - action_id
      - action_type
      - target
      - parameters
      - constraints
      - digest
  validated_void_action:
    required_fields:
      - action_id
      - digest
      - status
  approved_void_action:
    required_fields:
      - action_id
      - approval_id
      - digest
  recorded_action_result:
    required_fields:
      - status
      - action_id
      - decision
      - comparison
      - evidence_summary
      - artifact_refs
  action_approval_decision:
    required_fields:
      - approval_id
      - action_id
      - digest
      - decision
  scorecard_report:
    required_fields:
      - status
      - checks
