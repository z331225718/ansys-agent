id: hfss_live_port_create
version: 1
description: Preview, approve, create, and verify one typed DrivenModal HFSS Wave Port on a planar face or Lumped Port on a planar sheet without saving the live project.
nodes:
  - id: preview_port
    role: preview
    kind: program
    handler: assistant.live.hfss.preview_port_create
    input_schema: live_hfss_port_request
    output_schema: live_hfss_port_preview
    max_runs: 1
  - id: apply_port
    role: apply
    kind: program
    handler: assistant.live.hfss.apply_port_create
    input_schema: live_hfss_port_preview
    output_schema: live_hfss_port_result
    max_runs: 1
  - id: verify_scorecard
    role: scorecard
    kind: program
    handler: assistant.live.hfss.port_create_scorecard
    input_schema: live_hfss_port_result
    output_schema: live_hfss_port_scorecard
    max_runs: 1
edges:
  - id: preview-to-apply
    from: preview_port
    to: apply_port
    on: succeeded
  - id: apply-to-scorecard
    from: apply_port
    to: verify_scorecard
    on: succeeded
handoffs:
  live_hfss_port_request:
    required_fields: [boundary_kind, boundary_name]
  live_hfss_port_preview:
    required_fields: [boundary_kind, boundary_name, operation_preview_id, operation_approval, operation_preview, live_session_reused]
  live_hfss_port_result:
    required_fields: [boundary_kind, boundary_name, operation_result, live_session_reused]
  live_hfss_port_scorecard:
    required_fields: [status, checks, summary, live_session_reused]
