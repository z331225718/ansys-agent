id: brd_reviewed_model_optimize_loop
version: 1
description: "Reviewed AEDT model loop: prepare working copy -> solve -> export -> score -> decide -> edit -> repeat -> report"

nodes:
  - id: prepare_working_project
    role: prepare
    kind: program
    handler: brd.optimization.prepare_working_project
    output_schema: real_solve_request
    max_runs: 1

  - id: real_solve_worker
    role: worker
    kind: worker
    capability: brd.local_cut.solve
    input_schema: real_solve_request
    output_schema: solve_result
    on_failure: retry
    retry_max_attempts: 2
    retry_backoff: linear
    retry_delay_seconds: 30
    max_runs: 5

  - id: touchstone_export_worker
    role: worker
    kind: worker
    capability: brd.touchstone.export
    input_schema: solve_result
    output_schema: touchstone_export_result
    on_failure: fail
    max_runs: 5

  - id: tdr_export_worker
    role: worker
    kind: worker
    capability: brd.tdr.export
    input_schema: touchstone_export_result
    output_schema: tdr_export_result
    on_failure: fail
    max_runs: 5

  - id: channel_score_worker
    role: worker
    kind: worker
    capability: brd.channel.score
    input_schema: tdr_export_result
    output_schema: score_result
    max_runs: 5

  - id: iteration_qualifier_worker
    role: scorecard
    kind: worker
    capability: brd.iteration.qualify
    input_schema: score_result
    output_schema: score_result
    max_runs: 5

  - id: progress_report_worker
    role: scorecard
    kind: worker
    capability: brd.optimization.progress
    input_schema: score_result
    output_schema: score_result
    max_runs: 5

  - id: optimization_decider
    role: decision_maker
    kind: agent
    handler: brd.optimization.decide_next_action
    system_prompt: optimization_decider_prompt
    input_schema: score_result
    output_schema: next_action
    profile: high_reasoning
    constraints:
      deterministic_fallback: true
      response_format: json_object
      evidence_policy: bounded_summary_only
      allowed_decisions:
        - continue
        - complete
        - failed
      geometry_limits:
        anti_pad:
          max_radius_mil: 22
          worker_constraints:
            max_diameter: 44mil
        non_functional_pad:
          min_radius_mil: 7.875
          max_radius_mil: 10
          worker_constraints:
            min_diameter: 15.75mil
            max_diameter: 20mil
    max_runs: 5

  - id: iteration_qualification_approval_gate
    role: approval_gate
    kind: human_gate
    input_schema: score_result
    output_schema: score_result
    max_runs: 5

  - id: geometry_validator_worker
    role: worker
    kind: worker
    capability: brd.geometry.validate
    input_schema: model_edit_request
    output_schema: model_edit_request
    max_runs: 4

  - id: optimization_failure
    role: validator
    kind: program
    handler: brd.optimization.fail_optimization
    max_runs: 4

  - id: model_edit_worker
    role: worker
    kind: worker
    capability: brd.model.edit
    input_schema: model_edit_request
    output_schema: model_edit_result
    on_failure: fail
    max_runs: 4

  - id: prepare_next_solve
    role: prepare
    kind: program
    handler: brd.optimization.prepare_next_solve
    input_schema: model_edit_result
    output_schema: real_solve_request
    max_runs: 4

  - id: optimization_report
    role: scorecard
    kind: worker
    capability: brd.optimization.report
    input_schema: next_action
    output_schema: scorecard_report
    max_runs: 1

edges:
  - id: prepare-to-solve
    from: prepare_working_project
    to: real_solve_worker
    on: succeeded
    max_traversals: 1
  - id: solve-to-touchstone-export
    from: real_solve_worker
    to: touchstone_export_worker
    on: succeeded
    max_traversals: 5
  - id: touchstone-export-to-tdr-export
    from: touchstone_export_worker
    to: tdr_export_worker
    on: succeeded
    max_traversals: 5
  - id: tdr-export-to-score
    from: tdr_export_worker
    to: channel_score_worker
    on: succeeded
    max_traversals: 5
  - id: score-to-qualify
    from: channel_score_worker
    to: iteration_qualifier_worker
    on: succeeded
    max_traversals: 5
  - id: qualify-to-decide
    from: iteration_qualifier_worker
    to: progress_report_worker
    on: succeeded
    max_traversals: 5
  - id: qualify-to-approval
    from: iteration_qualifier_worker
    to: iteration_qualification_approval_gate
    on: approval_required
    max_traversals: 5
  - id: qualification-approval-to-progress
    from: iteration_qualification_approval_gate
    to: progress_report_worker
    on: approved
    max_traversals: 5
  - id: progress-to-decide
    from: progress_report_worker
    to: optimization_decider
    on: succeeded
    max_traversals: 5
  - id: decide-to-report
    from: optimization_decider
    to: optimization_report
    on: complete
    max_traversals: 1
  - id: decide-to-edit
    from: optimization_decider
    to: geometry_validator_worker
    on: continue
    max_traversals: 4
  - id: decide-to-failure
    from: optimization_decider
    to: optimization_failure
    on: failed
    max_traversals: 1
  - id: validate-to-edit
    from: geometry_validator_worker
    to: model_edit_worker
    on: succeeded
    max_traversals: 4
  - id: validate-to-failure
    from: geometry_validator_worker
    to: optimization_failure
    on: approval_required
    max_traversals: 4
  - id: edit-to-next-solve
    from: model_edit_worker
    to: prepare_next_solve
    on: succeeded
    max_traversals: 4
  - id: next-solve-to-solve
    from: prepare_next_solve
    to: real_solve_worker
    on: succeeded
    max_traversals: 4

profiles:
  low_cost:
    model: gpt-4.1-mini
    temperature: 0.2
    max_tokens: 2048
  standard:
    model: gpt-4.1-mini
    temperature: 0.1
    max_tokens: 4096
  high_reasoning:
    model: gpt-4.1
    temperature: 0.2
    max_tokens: 4096

prompts:
  optimization_decider_prompt: |
    You are the reviewed BRD optimization decider. Use only bounded evidence
    and candidate actions from the handoff. Do not read or request raw
    S-parameter or TDR arrays.

    The current workflow is differential: Touchstone must be treated as s4p,
    return loss is SDD11, insertion loss is SDD21, and the default TDR
    observation port is Diff1. Before mapping a TDR feature to near/far
    geometry, use tdr_observation_port and tdr_port_orientation_evidence; if
    orientation is unknown, say unknown and fail this optimization decision
    rather than inventing a physical location.

    Choose exactly one decision:
    - continue: select one small, reversible action within constraints.
    - complete: stop because the current evidence is acceptable or no bounded
      action remains.
    - failed: the graph should fail because the evidence is invalid.

    Return a JSON object that satisfies the next_action handoff. Include:
    decision, reason, selected_action when continuing, tdr_observation_port,
    tdr_port_orientation_evidence, constraints_checked, risk, rollback, and
    loop_context.

    For continue, selected_action must be directly executable by the geometry
    validator:
    - anti_pad.enlarge: include target_radius or target_diameter, parameter_name,
      target layers with selected physical shape evidence,
      center_padstack_instance_ids or via_centers, plane_shape_ids or equivalent
      shape_evidence, and bridge_between_vias only when the intended bridge
      centers are clear. If circular voids list more than two centers, include exactly two
      bridge_center_padstack_instance_ids or bridge_via_centers for the bridge.
    - non_functional_pad.add_or_enlarge: use shape/circle_shape implementation,
      include target_radius in [7.875mil, 10mil], parameter_name, target layers,
      and center_padstack_instance_ids or via_centers plus signal net evidence.

handoffs:
  real_solve_request:
    required_fields:
      - project_path
      - setup_name
      - sweep_name
      - tdr_expression
      - expected_port_count
      - loop_context
  solve_result:
    required_fields:
      - status
      - project_path
      - solve_manifest
      - artifact_dir
      - loop_context
  touchstone_export_result:
    required_fields:
      - status
      - touchstone_path
      - touchstone_kind
      - sparameter_mode
      - return_loss_trace
      - insertion_loss_trace
      - touchstone_export_manifest
      - artifact_dir
      - loop_context
  tdr_export_result:
    required_fields:
      - status
      - touchstone_path
      - tdr_path
      - touchstone_export_manifest
      - tdr_export_manifest
      - artifact_dir
      - loop_context
  score_result:
    required_fields:
      - status
      - score
      - evidence_summary
      - evidence_artifact
      - loop_context
  next_action:
    required_fields:
      - decision
      - reason
      - tdr_observation_port
      - tdr_port_orientation_evidence
      - constraints_checked
      - risk
      - rollback
      - loop_context
  model_edit_request:
    required_fields:
      - project_path
      - actions
      - project_copy_mode
      - loop_context
  model_edit_result:
    required_fields:
      - status
      - edited_project_path
      - model_edit_manifest
      - loop_context
  scorecard_report:
    required_fields:
      - status
      - checks
      - optimization_history_csv
      - optimization_history_rows
