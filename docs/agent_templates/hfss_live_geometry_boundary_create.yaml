id: hfss_live_geometry_boundary_create
version: 1
description: Preview, approve, atomically create, and verify a bounded HFSS geometry and boundary batch without saving the live project.
nodes:
  - id: preview_geometry_boundaries
    role: preview
    kind: program
    handler: assistant.live.hfss.preview_geometry_boundary_create
    input_schema: live_hfss_geometry_boundary_request
    output_schema: live_hfss_geometry_boundary_preview
    max_runs: 1
  - id: apply_geometry_boundaries
    role: apply
    kind: program
    handler: assistant.live.hfss.apply_geometry_boundary_create
    input_schema: live_hfss_geometry_boundary_preview
    output_schema: live_hfss_geometry_boundary_apply_result
    max_runs: 1
  - id: verify_scorecard
    role: scorecard
    kind: program
    handler: assistant.live.hfss.geometry_boundary_create_scorecard
    input_schema: live_hfss_geometry_boundary_apply_result
    output_schema: live_hfss_geometry_boundary_scorecard
    max_runs: 1
edges:
  - id: preview-to-apply
    from: preview_geometry_boundaries
    to: apply_geometry_boundaries
    on: succeeded
  - id: apply-to-scorecard
    from: apply_geometry_boundaries
    to: verify_scorecard
    on: succeeded
handoffs:
  live_hfss_geometry_boundary_request:
    required_fields: [primitives, boundaries]
  live_hfss_geometry_boundary_preview:
    required_fields: [primitives, boundaries, operation_preview_id, operation_approval, operation_preview, live_session_reused]
  live_hfss_geometry_boundary_apply_result:
    required_fields: [primitives, boundaries, operation_result, live_session_reused]
  live_hfss_geometry_boundary_scorecard:
    required_fields: [status, checks, summary, live_session_reused]
