id: hfss_live_geometry_move
version: 1
description: Preview, approve, translate, and verify an exact bounded batch of existing HFSS solids or sheets in Global coordinates while preserving boundaries, mesh assignments, material, and Solve Inside.
nodes:
  - id: preview_geometry_moves
    role: preview
    kind: program
    handler: assistant.live.hfss.preview_geometry_move
    input_schema: live_hfss_geometry_move_request
    output_schema: live_hfss_geometry_move_preview
    max_runs: 1
  - id: apply_geometry_moves
    role: apply
    kind: program
    handler: assistant.live.hfss.apply_geometry_move
    input_schema: live_hfss_geometry_move_preview
    output_schema: live_hfss_geometry_move_result
    max_runs: 1
  - id: verify_scorecard
    role: scorecard
    kind: program
    handler: assistant.live.hfss.geometry_move_scorecard
    input_schema: live_hfss_geometry_move_result
    output_schema: live_hfss_geometry_move_scorecard
    max_runs: 1
edges:
  - id: preview-to-apply
    from: preview_geometry_moves
    to: apply_geometry_moves
    on: succeeded
  - id: apply-to-scorecard
    from: apply_geometry_moves
    to: verify_scorecard
    on: succeeded
handoffs:
  live_hfss_geometry_move_request:
    required_fields: [moves]
  live_hfss_geometry_move_preview:
    required_fields: [moves, operation_preview_id, operation_approval, operation_preview, live_session_reused]
  live_hfss_geometry_move_result:
    required_fields: [moves, operation_result, live_session_reused]
  live_hfss_geometry_move_scorecard:
    required_fields: [status, checks, summary, live_session_reused]
