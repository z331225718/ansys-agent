id: layout_live_solve_export
version: 1
description: Start, monitor, and export one live HFSS 3D Layout solve through a bounded graph with two independent operation approvals.
nodes:
  - id: validate_setup
    role: validator
    kind: program
    handler: assistant.live.layout.validate_solve_setup
    input_schema: live_solve_export_request
    output_schema: live_solve_validated
    max_runs: 1
  - id: preview_analysis
    role: preview
    kind: program
    handler: assistant.live.layout.preview_analysis_start
    input_schema: live_solve_validated
    output_schema: live_solve_preview
    max_runs: 1
  - id: apply_analysis
    role: apply
    kind: program
    handler: assistant.live.layout.apply_analysis_start
    input_schema: live_solve_preview
    output_schema: live_solve_started
    max_runs: 1
  - id: poll_analysis
    role: monitor
    kind: program
    handler: assistant.live.layout.poll_analysis_status
    input_schema: live_solve_started
    output_schema: live_solve_observation
    join: any
    max_runs: 64
  - id: validate_export
    role: validator
    kind: program
    handler: assistant.live.layout.validate_results_export
    input_schema: live_solve_observation
    output_schema: live_export_validated
    max_runs: 1
  - id: preview_export
    role: preview
    kind: program
    handler: assistant.live.layout.preview_results_export
    input_schema: live_export_validated
    output_schema: live_export_preview
    max_runs: 1
  - id: apply_export
    role: apply
    kind: program
    handler: assistant.live.layout.apply_results_export
    input_schema: live_export_preview
    output_schema: live_export_apply_result
    max_runs: 1
  - id: verify_export
    role: scorecard
    kind: program
    handler: assistant.live.layout.results_export_scorecard
    input_schema: live_export_apply_result
    output_schema: live_solve_export_scorecard
    max_runs: 1
edges:
  - {id: validate-to-solve-preview, from: validate_setup, to: preview_analysis, on: succeeded, max_traversals: 1}
  - {id: solve-preview-to-apply, from: preview_analysis, to: apply_analysis, on: succeeded, max_traversals: 1}
  - {id: solve-apply-to-poll, from: apply_analysis, to: poll_analysis, on: succeeded, max_traversals: 1}
  - {id: poll-again, from: poll_analysis, to: poll_analysis, on: running, max_traversals: 63}
  - {id: poll-to-export-validation, from: poll_analysis, to: validate_export, on: stopped, max_traversals: 1}
  - {id: export-validation-to-preview, from: validate_export, to: preview_export, on: succeeded, max_traversals: 1}
  - {id: export-preview-to-apply, from: preview_export, to: apply_export, on: succeeded, max_traversals: 1}
  - {id: export-apply-to-scorecard, from: apply_export, to: verify_export, on: succeeded, max_traversals: 1}
handoffs:
  live_solve_export_request:
    required_fields: [setup_name, export_kind]
  live_solve_validated:
    required_fields: [setup_name, export_kind, setup_inventory, resources, live_session_reused]
  live_solve_preview:
    required_fields: [setup_name, resources, operation_preview_id, operation_approval, live_session_reused]
  live_solve_started:
    required_fields: [setup_name, export_kind, solve_result, live_session_reused]
  live_solve_observation:
    required_fields: [setup_name, export_kind, solve_result, analysis_status, poll_count, observed_running, live_session_reused]
  live_export_validated:
    required_fields: [export_kind, export_spec, solve_result, analysis_status, live_session_reused]
  live_export_preview:
    required_fields: [export_spec, solve_result, operation_preview_id, operation_approval, live_session_reused]
  live_export_apply_result:
    required_fields: [export_spec, solve_result, export_result, live_session_reused]
  live_solve_export_scorecard:
    required_fields: [status, checks, summary, artifact_refs, live_session_reused]
