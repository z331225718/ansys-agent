id: brd_local_cut_solve_evidence
version: 1
description: Score BRD local-cut solve evidence from recorded or exported Touchstone/TDR artifacts.
nodes:
  - id: planner
    role: planner
    kind: llm
    output_schema: brd_channel_score_request
    max_runs: 1
  - id: input_validator
    role: validator
    kind: program
    input_schema: brd_channel_score_request
    output_schema: validated_brd_channel_score_request
    max_runs: 1
  - id: channel_score_worker
    role: worker
    kind: worker
    capability: brd.channel.score
    input_schema: validated_brd_channel_score_request
    output_schema: brd_channel_score_result
    max_runs: 1
  - id: channel_scorecard
    role: scorecard
    kind: program
    input_schema: brd_channel_score_result
    output_schema: scorecard_report
    max_runs: 1
  - id: approval_gate
    role: approval_gate
    kind: human_gate
    input_schema: scorecard_report
    output_schema: approval_decision
    join: any
    max_runs: 1
edges:
  - id: planner-to-validator
    from: planner
    to: input_validator
    on: succeeded
    max_traversals: 1
  - id: validator-to-score-worker
    from: input_validator
    to: channel_score_worker
    on: succeeded
    max_traversals: 1
  - id: score-worker-to-scorecard
    from: channel_score_worker
    to: channel_scorecard
    on: succeeded
    max_traversals: 1
  - id: scorecard-to-approval
    from: channel_scorecard
    to: approval_gate
    on: passed
    max_traversals: 1
handoffs:
  brd_channel_score_request:
    required_fields:
      - touchstone_path
      - tdr_path
      - artifact_dir
  validated_brd_channel_score_request:
    required_fields:
      - touchstone_path
      - tdr_path
      - artifact_dir
      - frequency_start_ghz
      - frequency_stop_ghz
      - rl_target_db
      - tdr_target_ohm
  brd_channel_score_result:
    required_fields:
      - status
      - score
      - sparameter_evidence
      - evidence_summary
      - artifact_refs
  scorecard_report:
    required_fields:
      - status
      - checks
  approval_decision:
    required_fields:
      - approval_id
      - decision
